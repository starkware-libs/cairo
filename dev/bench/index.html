<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes" />
    <style>
      html {
        font-family: BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fff;
        font-size: 16px;
      }
      body {
        color: #4a4a4a;
        margin: 8px;
        font-size: 1em;
        font-weight: 400;
      }
      header {
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
      }
      a {
        color: #3273dc;
        cursor: pointer;
        text-decoration: none;
      }
      a:hover { color: #000; }
      button {
        color: #fff;
        background-color: #3298dc;
        border-color: transparent;
        cursor: pointer;
        text-align: center;
        padding: 4px 12px;
        border: none;
        border-radius: 4px;
      }
      button:hover { background-color: #2793da; }
      .spacer { flex: auto; }
      .small { font-size: 0.75rem; }
      footer {
        margin-top: 16px;
        display: flex;
        align-items: center;
      }
      .header-label { margin-right: 4px; }

      .tabs {
        display: flex;
        border-bottom: 2px solid #ddd;
        margin-bottom: 12px;
      }
      .tab-btn {
        background: none;
        color: #4a4a4a;
        border: none;
        border-bottom: 3px solid transparent;
        border-radius: 0;
        padding: 6px 16px;
        cursor: pointer;
        font-size: 1rem;
        margin-bottom: -2px;
      }
      .tab-btn:hover { color: #3273dc; background: none; }
      .tab-btn.active { color: #3273dc; border-bottom-color: #3273dc; font-weight: 600; }

      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      .bench-chart-wrap {
        margin-bottom: 28px;
        max-width: 900px;
      }
      .bench-chart-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 6px;
        padding-bottom: 4px;
        border-bottom: 1px solid #eee;
      }
      .empty { color: #999; padding: 8px 0; }
    </style>
    <title>Benchmarks</title>
  </head>

  <body>
    <header id="header">
      <div class="header-item">
        <strong class="header-label">Last Update:</strong>
        <span id="last-update"></span>
      </div>
      <div class="header-item">
        <strong class="header-label">Repository:</strong>
        <a id="repository-link" rel="noopener"></a>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="per-metric">Per Metric</button>
      <button class="tab-btn" data-tab="per-project">Per Project</button>
    </div>

    <main>
      <div id="tab-per-metric" class="tab-panel active"></div>
      <div id="tab-per-project" class="tab-panel"></div>
    </main>

    <footer>
      <button id="dl-button">Download data as JSON</button>
      <div class="spacer"></div>
      <div class="small">Powered by <a rel="noopener" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.2/dist/Chart.min.js"></script>
    <script src="data.js"></script>
    <script id="main-script">
      'use strict';
      (function() {
        const data = window.BENCHMARK_DATA;

        document.getElementById('last-update').textContent = new Date(data.lastUpdate).toString();
        const repoLink = document.getElementById('repository-link');
        repoLink.href = data.repoUrl;
        repoLink.textContent = data.repoUrl;

        document.getElementById('dl-button').onclick = () => {
          const dataUrl = 'data:,' + JSON.stringify(data, null, 2);
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'benchmark_data.json';
          a.click();
        };

        function escHtml(str) {
          return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // allSeries: benchName ("metric/project") → [{commit, date, bench}, ...] chronological
        const allSeries = new Map();
        for (const entries of Object.values(data.entries)) {
          for (const entry of entries) {
            for (const bench of entry.benches) {
              if (!allSeries.has(bench.name)) allSeries.set(bench.name, []);
              allSeries.get(bench.name).push({ commit: entry.commit, date: entry.date, bench });
            }
          }
        }

        function allRows() {
          const result = [];
          for (const [benchName, dataPoints] of allSeries) {
            const slash = benchName.indexOf('/');
            const metric  = slash >= 0 ? benchName.slice(0, slash) : benchName;
            const project = slash >= 0 ? benchName.slice(slash + 1) : benchName;
            result.push({ benchName, metric, project, dataPoints });
          }
          return result;
        }

        // Assign a stable color to each name from a given set of names.
        function buildColorMap(names) {
          const map = new Map();
          let i = 0;
          for (const name of names) map.set(name, colors[i++ % colors.length]);
          return map;
        }

        const colors = [
          '#dea584', '#00add8', '#f1e05a', '#3572a5',
          '#f34b7d', '#a270ba', '#b07219', '#178600',
          '#38ff38', '#ff3838', '#333333', '#6e5494',
        ];

        // Per Metric: one graph per metric, one line per project.
        function renderPerMetric(rows) {
          const panel = document.getElementById('tab-per-metric');
          panel.innerHTML = '';
          const byMetric = new Map();
          for (const row of rows) {
            if (!byMetric.has(row.metric)) byMetric.set(row.metric, []);
            byMetric.get(row.metric).push(row);
          }
          const projectColors = buildColorMap(new Set(rows.map(r => r.project)));
          for (const [metricName, series] of byMetric) {
            const seriesDataArr = series.map(s => s.dataPoints);
            const labels = series[0].dataPoints.map(d => d.commit.id.slice(0, 7));
            const unit = series[0].dataPoints[0]?.bench.unit ?? '';
            const datasets = series.map(({ project, dataPoints }) => {
              const color = projectColors.get(project);
              return {
                label: project,
                data: dataPoints.map(d => d.bench.value),
                borderColor: color,
                backgroundColor: color + '60',
              };
            });

            const wrap = document.createElement('div');
            wrap.className = 'bench-chart-wrap';
            const title = document.createElement('div');
            title.className = 'bench-chart-title';
            title.textContent = metricName;
            const canvas = document.createElement('canvas');
            wrap.appendChild(title);
            wrap.appendChild(canvas);
            panel.appendChild(wrap);

            new Chart(canvas, {
              type: 'line',
              data: { labels, datasets },
              options: {
                scales: {
                  xAxes: [{ scaleLabel: { display: true, labelString: 'commit' } }],
                  yAxes: [{ scaleLabel: { display: true, labelString: unit }, ticks: { beginAtZero: true } }],
                },
                tooltips: {
                  callbacks: {
                    afterTitle: items => {
                      const d = seriesDataArr[items[0].datasetIndex][items[0].index];
                      return '\n' + d.commit.message.split('\n')[0] + '\n\n' +
                        d.commit.timestamp + ' committed by @' + d.commit.committer.username + '\n';
                    },
                    label: item => {
                      const { bench } = seriesDataArr[item.datasetIndex][item.index];
                      let label = item.dataset.label + ': ' + item.value + ' ' + bench.unit;
                      if (bench.range) label += ' (' + bench.range + ')';
                      return label;
                    },
                    afterLabel: item => {
                      const { extra } = seriesDataArr[item.datasetIndex][item.index].bench;
                      return extra ? '\n' + extra : '';
                    },
                  },
                },
                onClick: (_evt, elems) => {
                  if (elems.length === 0) return;
                  const d = seriesDataArr[elems[0]._datasetIndex][elems[0]._index];
                  window.open(d.commit.url, '_blank');
                },
              },
            });
          }
          if (!panel.firstChild) panel.innerHTML = '<div class="empty">No matching benchmarks.</div>';
        }

        // Per Project: one graph per project name, one line per metric that contains it.
        function renderPerProject(rows) {
          const panel = document.getElementById('tab-per-project');
          panel.innerHTML = '';

          const byProject = new Map();
          for (const row of rows) {
            if (!byProject.has(row.project)) byProject.set(row.project, []);
            byProject.get(row.project).push(row);
          }

          const metricColors = buildColorMap(new Set(rows.map(r => r.metric)));
          for (const [projectName, series] of byProject) {
            const seriesDataArr = series.map(s => s.dataPoints);
            const labels = series[0].dataPoints.map(d => d.commit.id.slice(0, 7));
            const unit = series[0].dataPoints[0]?.bench.unit ?? '';
            const datasets = series.map(({ metric, dataPoints }) => {
              const color = metricColors.get(metric);
              return {
                label: metric,
                data: dataPoints.map(d => d.bench.value),
                borderColor: color,
                backgroundColor: color + '60',
              };
            });

            const wrap = document.createElement('div');
            wrap.className = 'bench-chart-wrap';
            const title = document.createElement('div');
            title.className = 'bench-chart-title';
            title.textContent = projectName;
            const canvas = document.createElement('canvas');
            wrap.appendChild(title);
            wrap.appendChild(canvas);
            panel.appendChild(wrap);

            new Chart(canvas, {
              type: 'line',
              data: { labels, datasets },
              options: {
                scales: {
                  xAxes: [{ scaleLabel: { display: true, labelString: 'commit' } }],
                  yAxes: [{ scaleLabel: { display: true, labelString: unit }, ticks: { beginAtZero: true } }],
                },
                tooltips: {
                  callbacks: {
                    afterTitle: items => {
                      const d = seriesDataArr[items[0].datasetIndex][items[0].index];
                      return '\n' + d.commit.message.split('\n')[0] + '\n\n' +
                        d.commit.timestamp + ' committed by @' + d.commit.committer.username + '\n';
                    },
                    label: item => {
                      const { bench } = seriesDataArr[item.datasetIndex][item.index];
                      let label = item.dataset.label + ': ' + item.value + ' ' + bench.unit;
                      if (bench.range) label += ' (' + bench.range + ')';
                      return label;
                    },
                    afterLabel: item => {
                      const { extra } = seriesDataArr[item.datasetIndex][item.index].bench;
                      return extra ? '\n' + extra : '';
                    },
                  },
                },
                onClick: (_evt, elems) => {
                  if (elems.length === 0) return;
                  const d = seriesDataArr[elems[0]._datasetIndex][elems[0]._index];
                  window.open(d.commit.url, '_blank');
                },
              },
            });
          }
          if (!panel.firstChild) panel.innerHTML = '<div class="empty">No matching benchmarks.</div>';
        }

        function render() {
          const rows = allRows();
          renderPerMetric(rows);
          renderPerProject(rows);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
          });
        });

        render();
      })();
    </script>
  </body>
</html>
