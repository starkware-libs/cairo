<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes" />
    <style>
      html {
        font-family: BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fff;
        font-size: 16px;
      }
      body {
        color: #4a4a4a;
        margin: 8px;
        font-size: 1em;
        font-weight: 400;
      }
      header {
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
      }
      a {
        color: #3273dc;
        cursor: pointer;
        text-decoration: none;
      }
      a:hover { color: #000; }
      button {
        color: #fff;
        background-color: #3298dc;
        border-color: transparent;
        cursor: pointer;
        text-align: center;
        padding: 4px 12px;
        border: none;
        border-radius: 4px;
      }
      button:hover { background-color: #2793da; }
      .spacer { flex: auto; }
      .small { font-size: 0.75rem; }
      footer {
        margin-top: 16px;
        display: flex;
        align-items: center;
      }
      .header-label { margin-right: 4px; }

      .tabs {
        display: flex;
        border-bottom: 2px solid #ddd;
        margin-bottom: 12px;
      }
      .tab-btn {
        background: none;
        color: #4a4a4a;
        border: none;
        border-bottom: 3px solid transparent;
        border-radius: 0;
        padding: 6px 16px;
        cursor: pointer;
        font-size: 1rem;
        margin-bottom: -2px;
      }
      .tab-btn:hover { color: #3273dc; background: none; }
      .tab-btn.active { color: #3273dc; border-bottom-color: #3273dc; font-weight: 600; }

      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      .bench-chart-wrap {
        margin-bottom: 28px;
        max-width: 900px;
      }
      .bench-chart-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 6px;
        padding-bottom: 4px;
        border-bottom: 1px solid #eee;
      }
      .empty { color: #999; padding: 8px 0; }
    </style>
    <title>Benchmarks</title>
  </head>

  <body>
    <header id="header">
      <div class="header-item">
        <strong class="header-label">Last Update:</strong>
        <span id="last-update"></span>
      </div>
      <div class="header-item">
        <strong class="header-label">Repository:</strong>
        <a id="repository-link" rel="noopener"></a>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="per-metric">Per Metric</button>
      <button class="tab-btn" data-tab="per-project">Per Project</button>
    </div>

    <main>
      <div id="tab-per-metric" class="tab-panel active"></div>
      <div id="tab-per-project" class="tab-panel"></div>
    </main>

    <footer>
      <button id="dl-button">Download data as JSON</button>
      <div class="spacer"></div>
      <div class="small">Powered by <a rel="noopener" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.2/dist/Chart.min.js"></script>
    <script src="data.js"></script>
    <script id="main-script">
      'use strict';
      (function() {
        const data = window.BENCHMARK_DATA;

        document.getElementById('last-update').textContent = new Date(data.lastUpdate).toString();
        const repoLink = document.getElementById('repository-link');
        repoLink.href = data.repoUrl;
        repoLink.textContent = data.repoUrl;

        document.getElementById('dl-button').onclick = () => {
          const dataUrl = 'data:,' + JSON.stringify(data, null, 2);
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'benchmark_data.json';
          a.click();
        };

        function escHtml(str) {
          return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Each suite (timing, heap, ...) runs once per night, so entry i of one suite and entry i
        // of another are the same nightly run on the same commit. A suite added later has fewer
        // entries, so tail-align every suite to the most recent night: its entries occupy the last
        // N nights. A bench's `night` is then its shared x-axis column — the timing and heap
        // measurements of one night line up, while re-runs of a commit on different nights stay as
        // separate columns.
        const nights = Math.max(...Object.values(data.entries).map(entries => entries.length));
        // allSeries: benchName ("metric/project") → [{night, commit, date, bench}, ...] chronological
        const allSeries = new Map();
        for (const entries of Object.values(data.entries)) {
          const offset = nights - entries.length;
          entries.forEach((entry, i) => {
            const night = offset + i;
            for (const bench of entry.benches) {
              if (!allSeries.has(bench.name)) allSeries.set(bench.name, []);
              allSeries.get(bench.name).push({ night, commit: entry.commit, date: entry.date, bench });
            }
          });
        }

        function allRows() {
          const result = [];
          for (const [benchName, dataPoints] of allSeries) {
            const slash = benchName.indexOf('/');
            const metric  = slash >= 0 ? benchName.slice(0, slash) : benchName;
            const project = slash >= 0 ? benchName.slice(slash + 1) : benchName;
            result.push({ benchName, metric, project, dataPoints });
          }
          return result;
        }

        // Assign a stable color to each name from a given set of names.
        function buildColorMap(names) {
          const map = new Map();
          let i = 0;
          for (const name of names) map.set(name, colors[i++ % colors.length]);
          return map;
        }

        const colors = [
          '#dea584', '#00add8', '#f1e05a', '#3572a5',
          '#f34b7d', '#a270ba', '#b07219', '#178600',
          '#38ff38', '#ff3838', '#333333', '#6e5494',
        ];

        // Draw a line chart for `series` (each {dataPoints, ...}) sharing one x-axis.
        // The axis is one column per nightly run (see `night` above): a series that started later
        // lines up at the correct right-hand columns, and series measured by separate suites (e.g.
        // timing in ns/iter and heap in bytes) share each night's column instead of landing on
        // adjacent, offset columns. Each distinct unit gets its own y-axis (first on the left, the
        // rest on the right), so a chart mixing units plots each on a comparable scale. `labelOf`
        // picks each series' legend label; `colorMap` maps that label to a color.
        function drawChart(panel, title, series, labelOf, colorMap) {
          const wrap = document.createElement('div');
          wrap.className = 'bench-chart-wrap';
          const titleEl = document.createElement('div');
          titleEl.className = 'bench-chart-title';
          titleEl.textContent = title;
          const canvas = document.createElement('canvas');
          wrap.appendChild(titleEl);
          wrap.appendChild(canvas);
          // Attach to the live panel BEFORE creating the chart: a responsive Chart.js chart
          // sizes itself from its parent container, and constructing it on a detached canvas
          // sends it into an unbounded resize loop ("Maximum call stack size exceeded").
          panel.appendChild(wrap);

          // X-axis = the nightly runs the chart's series appear in. Each night holds the timing and
          // heap measurements of one run, so series from different suites align on it by night.
          const nightSet = new Set();
          const nightCommit = new Map();
          for (const s of series) {
            for (const dp of s.dataPoints) {
              nightSet.add(dp.night);
              if (!nightCommit.has(dp.night)) nightCommit.set(dp.night, dp.commit);
            }
          }
          const runNights = [...nightSet].sort((a, b) => a - b);
          const slot = new Map(runNights.map((n, i) => [n, i]));
          const labels = runNights.map(n => nightCommit.get(n).id.slice(0, 7));

          // aligned[seriesIdx][slot] = data point at that night, or null if the series had no run there.
          const aligned = series.map(({ dataPoints }) => {
            const arr = new Array(runNights.length).fill(null);
            for (const dp of dataPoints) arr[slot.get(dp.night)] = dp;
            return arr;
          });

          // One y-axis per distinct unit, in first-seen order: y-0 left, the rest stacked right.
          const unitOf = s => s.dataPoints[0]?.bench.unit ?? '';
          const units = [...new Set(series.map(unitOf))];
          const yAxisId = unit => 'y-' + units.indexOf(unit);
          const yAxes = units.map((unit, i) => ({
            id: yAxisId(unit),
            position: i === 0 ? 'left' : 'right',
            scaleLabel: { display: true, labelString: unit },
            ticks: { beginAtZero: true },
            // Keep only the first axis' gridlines so stacked right axes don't clutter the plot.
            gridLines: { drawOnChartArea: i === 0 },
          }));

          const datasets = series.map((s, i) => {
            const color = colorMap.get(labelOf(s));
            // When the chart carries more than one unit, name the line's unit so the reader
            // can tell which y-axis it belongs to.
            const label = units.length > 1 ? labelOf(s) + ' (' + unitOf(s) + ')' : labelOf(s);
            return {
              label,
              yAxisID: yAxisId(unitOf(s)),
              data: aligned[i].map(dp => (dp ? dp.bench.value : null)),
              borderColor: color,
              backgroundColor: color + '60',
              // Runs from another suite leave gaps in the interleaved region; bridge them so each
              // line stays continuous instead of rendering as scattered points.
              spanGaps: true,
            };
          });

          new Chart(canvas, {
            type: 'line',
            data: { labels, datasets },
            options: {
              scales: {
                xAxes: [{ scaleLabel: { display: true, labelString: 'commit' } }],
                yAxes,
              },
              tooltips: {
                callbacks: {
                  afterTitle: items => {
                    const d = aligned[items[0].datasetIndex][items[0].index];
                    return d ? '\n' + d.commit.message.split('\n')[0] + '\n\n' +
                      d.commit.timestamp + ' committed by @' + d.commit.committer.username + '\n' : '';
                  },
                  label: item => {
                    const d = aligned[item.datasetIndex][item.index];
                    if (!d) return '';
                    // Chart.js 2.x tooltip items carry no `dataset`; read the line label from
                    // the datasets array we built above (in closure).
                    let label = datasets[item.datasetIndex].label + ': ' + d.bench.value + ' ' + d.bench.unit;
                    if (d.bench.range) label += ' (' + d.bench.range + ')';
                    return label;
                  },
                  afterLabel: item => {
                    const d = aligned[item.datasetIndex][item.index];
                    return d && d.bench.extra ? '\n' + d.bench.extra : '';
                  },
                },
              },
              onClick: (_evt, elems) => {
                if (elems.length === 0) return;
                const d = aligned[elems[0]._datasetIndex][elems[0]._index];
                if (d) window.open(d.commit.url, '_blank');
              },
            },
          });
        }

        // Per Metric: one graph per metric, one line per project.
        function renderPerMetric(rows) {
          const panel = document.getElementById('tab-per-metric');
          panel.innerHTML = '';
          const byMetric = new Map();
          for (const row of rows) {
            if (!byMetric.has(row.metric)) byMetric.set(row.metric, []);
            byMetric.get(row.metric).push(row);
          }
          const projectColors = buildColorMap(new Set(rows.map(r => r.project)));
          for (const [metricName, series] of byMetric) {
            drawChart(panel, metricName, series, s => s.project, projectColors);
          }
          if (!panel.firstChild) panel.innerHTML = '<div class="empty">No matching benchmarks.</div>';
        }

        // Per Project: one graph per project name, one line per metric that contains it.
        function renderPerProject(rows) {
          const panel = document.getElementById('tab-per-project');
          panel.innerHTML = '';

          const byProject = new Map();
          for (const row of rows) {
            if (!byProject.has(row.project)) byProject.set(row.project, []);
            byProject.get(row.project).push(row);
          }

          const metricColors = buildColorMap(new Set(rows.map(r => r.metric)));
          for (const [projectName, series] of byProject) {
            drawChart(panel, projectName, series, s => s.metric, metricColors);
          }
          if (!panel.firstChild) panel.innerHTML = '<div class="empty">No matching benchmarks.</div>';
        }

        // Render a tab's charts the first time its panel becomes visible. Building a chart while
        // its panel is `display:none` gives Chart.js a zero-width container, and the axis-fitting
        // pass never converges (infinite `fitBoxes` recursion -> "Maximum call stack size
        // exceeded"). Deferring until the panel is shown guarantees a real size to lay out in.
        const renderedTabs = new Set();
        function renderTab(tab) {
          if (renderedTabs.has(tab)) return;
          renderedTabs.add(tab);
          const rows = allRows();
          if (tab === 'per-metric') renderPerMetric(rows);
          else if (tab === 'per-project') renderPerProject(rows);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            // Make the panel visible first, then render into it so the charts get a real size.
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            renderTab(btn.dataset.tab);
          });
        });

        // Render whichever tab is active on load (its panel is already visible).
        renderTab(document.querySelector('.tab-btn.active').dataset.tab);
      })();
    </script>
  </body>
</html>
