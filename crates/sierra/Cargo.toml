[package]
name = "sierra"
version = "0.1.0"
edition = "2021"
build = "src/build.rs" # LALRPOP preprocessing

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
lalrpop = "*"
regex = "1"

[dependencies]
lalrpop-util = { version = "*", features = ["lexer"] }
