name: Nightly

on:
  schedule:
    # Runs the end of every day.
    - cron: "0 0 * * *"

env:
  RUSTUP_TOOLCHAIN: nightly

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: scripts/rust_fmt.sh --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: >
          scripts/clippy.sh

  cairotest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: |
          cargo run --profile=ci-dev --bin cairo-test -- corelib/
      - run: |
          cargo run --profile=ci-dev --bin cairo-test -- tests/bug_samples --starknet
      - run: |
          cargo run --profile=ci-dev --bin cairo-test -- crates/cairo-lang-starknet/cairo_level_tests/ --starknet

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: >
          scripts/docs.sh

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: crate-ci/typos@3bc303c295c081add5df4a4d52a1e117f2fb2dce # master

  benchmark:
    if: github.repository == 'starkware-libs/cairo'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: benchmark-results
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run timing benchmarks
        run: |
          set -o pipefail
          cargo bench --bench compile -- --output-format bencher 2>&1 | tee benchmark-output.txt

      - name: Store timing benchmark results
        uses: benchmark-action/github-action-benchmark@4bdcce38c94cec68da58d012ac24b7b1155efe8b
        with:
          name: Cairo Compiler Benchmarks
          tool: 'cargo'
          output-file-path: benchmark-output.txt
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          fail-on-alert: true
          alert-threshold: '150%'

      - name: Run heap benchmarks
        run: cargo bench --bench dhat_compile --features dhat

      - name: Store heap benchmark results
        uses: benchmark-action/github-action-benchmark@4bdcce38c94cec68da58d012ac24b7b1155efe8b
        with:
          name: Cairo Heap Benchmarks
          tool: 'customSmallerIsBetter'
          output-file-path: target/dhat-bench/dhat-output.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          fail-on-alert: true
          alert-threshold: '150%'
          # MUST run after `Store timing benchmark results`, which fetches the gh-pages worktree
          # this step then reuses. Reordering or removing the timing step will break this one.
          skip-fetch-gh-pages: true

      - name: Run LS-flow heap benchmark
        run: cargo bench --bench dhat_ls_flow --features dhat

      - name: Store LS-flow heap benchmark results
        uses: benchmark-action/github-action-benchmark@4bdcce38c94cec68da58d012ac24b7b1155efe8b
        with:
          name: Cairo LS-Flow Memory Benchmarks
          tool: 'customSmallerIsBetter'
          output-file-path: target/dhat-bench/dhat-ls-output.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          fail-on-alert: true
          alert-threshold: '150%'
          # Like the heap step, reuses the gh-pages worktree fetched by the timing step.
          skip-fetch-gh-pages: true

      - name: Run language-server re-execution benchmark
        run: cargo bench --bench ls_reexec

      - name: Store language-server re-execution benchmark results
        uses: benchmark-action/github-action-benchmark@4bdcce38c94cec68da58d012ac24b7b1155efe8b
        with:
          name: Cairo Language Server Re-execution Benchmarks
          tool: 'customSmallerIsBetter'
          output-file-path: target/ls-reexec/ls-reexec-output.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          fail-on-alert: true
          alert-threshold: '150%'
          # Like the heap step, reuses the gh-pages worktree fetched by the timing step.
          skip-fetch-gh-pages: true

      - name: Push results to gh-pages
        run: git push origin gh-pages

  starknet_sierra_validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: >
          scripts/starknet_sierra_validate.sh https://starknet-mainnet.core.chainstack.com/57088c25afa0ff21277c6ee5f3b536bb/rpc/v0_7 10000
      - run: >
          scripts/starknet_sierra_validate.sh https://starknet-sepolia.core.chainstack.com/2eaebe8806ed2208f571223be415f594/rpc/v0_7 10000
