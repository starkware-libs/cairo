name: release
on:
  push:
    tags:
      - "v*"

jobs:
  publish_crates:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        run: ./scripts/release_crates.sh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Publish for ${{ matrix.os }}
    needs: publish_crates
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: x86_64-unknown-linux-musl.tar.gz
            asset_name: release-x86_64-unknown-linux-musl.tar.gz
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            artifact_name: aarch64-apple-darwin.tar.gz
            asset_name: release-aarch64-apple-darwin.tar.gz
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - name: Install musl
        run: |
          if [ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]
          then
            sudo apt-get install -y musl-tools
          fi
      - name: Build in ${{ matrix.target }}
        run: ./scripts/release_tar.sh ${{ matrix.target }}
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
          overwrite: true
          body: "Cairo compiler."
